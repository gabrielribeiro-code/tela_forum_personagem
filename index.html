<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Tela de Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="styles/style.css">

</head>

<body>

    <body class="bg-body text-black">

        <main class="mt-5">

            <div class="d-flex justify-content-center align-items-center">
                <div class="col-10 col-md-8 col-lg-6">

                    <div class="card-body">
                        <div class="card shadow p-4">

                            <form id="form-login" class=" row g-3">
                                <h2 id="titulo" class="text-center mb-3">Login</h2>

                                <p class="text-center mb-3"> Preencha os dados abaixos para realizar o registro completo
                                    do
                                    usuário no sistema.</p>

                                <div class="col-md-12">
                                    <label for="nome" class="form-label">Nome Usuário</label>
                                    <input type="text" class="form-control" id="nome" required>
                                </div>

                                <div class="col-md-12">
                                    <label for="senha" class="form-label">Senha</label>
                                    <input type="password" class="form-control" id="senha" required>
                                </div>



                                <div class="card-body">
                                    <div class="col-12">
                                        <button type="submit" class="btn btn-primary w-100">Fazer Login</button>
                                    </div>
                                </div>

                            </form>


                            <div id="mensagem" class="text-center mb-3"></div>
                            <div class="toggle text-center mb-3" id="toggle"></div>
                            
                        </div>
                    </div>
                </div>
            </div>

            <div class="mt-5">
                <div class="d-flex justify-content-center align-items-center">
                    <img id="image" src="assets/image/acf7fd76cfac91e9939518edb1f5d14e.gif" alt="Gif Barba Branca">
                </div>
            </div>
        </main>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"></script>

        <script src="scripts/script.js"> </script>

    </body>

</html>
