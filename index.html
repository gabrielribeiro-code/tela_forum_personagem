<head>

    <title>Tela de Login</title>

<body class="bg-body text-black">

           <div class="col-12 col-md-10 col-lg-8">
        
        <div class="card-body">
        <div class="card shadow p-4">

                    <form id="form-login" class=" row g-3">
                        <h2 id="titulo" class="text-center mb-3">Cadastro Aluno</h2>

                        <p class="text-center mb-3"> Preencha os dados abaixos para realizar o registro completo do
                            aluno no sistema acadêmico</p>

                        <div class="col-md-12">
                            <label for="nome" class="form-label">Nome Completo</label>
                            <input type="text" class="form-control" id="nome">
                        </div>

                        <div class="col-md-6">
                            <label for="senha" class="form-label">Senha</label>
                            <input type="password" class="form-control" id="senha">
                        </div>

                    </form>
                        </div>
                         </div>
                          </div>
                           </div>


                        </main>
