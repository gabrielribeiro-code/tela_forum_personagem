<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela de Login</title>
    <link rel="icon" href="assets/image/site-icon.jpg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        crossorigin="anonymous">
    <link rel="stylesheet" href="styles/style.css">
</head>

<body id="body-index" class="text-black">

    <main>
        <div class="d-flex justify-content-center align-items-center vh-100 px-3">
            <div class="col-12 col-sm-10 col-md-6 col-lg-4">

                <div class="card shadow p-4" style="border: 4px solid var(--cor-vermelho); border-radius: 20px;">
                    <div class="card-body">

                        <form id="form-login" class="row g-3">
                            <h2 id="titulo" class="text-center mb-4 fw-bold">Login</h2>

                            <div class="col-12">
                                <label for="nome" class="form-label">Nome Usuário</label>
                                <input type="text" class="form-control" id="nome" required>
                            </div>

                            <div class="col-12">
                                <label for="senha" class="form-label">Senha</label>
                                <input type="password" class="form-control" id="senha" required>
                            </div>

                            <div class="col-12 mt-4">
                                <button style="background-color: var(--cor-vermelho); border: none;" type="submit"
                                    class="btn btn-dark w-100 py-2">
                                    Fazer Login
                                </button>
                            </div>
                        </form>

                        <div id="mensagem" class="text-center mt-3"></div>
                        <div class="toggle text-center mt-2" id="toggle"></div>

                    </div>
                </div>

            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        crossorigin="anonymous"></script>
    <script src="scripts/script.js"></script>

</body>

</html>
